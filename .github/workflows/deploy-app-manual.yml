# ─────────────────────────────────────────────────────────────
# Fonte da verdade: iac-actions/templates/cd/deploy-app-manual.yml
# Copiado para app repos via sync-esteira (iac_actions_pinned_sha).
# Mudanças devem ser feitas AQUI, no iac-actions.
# ─────────────────────────────────────────────────────────────

name: Deploy App Manual

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a deployar'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      image_tag:
        description: 'Tag da imagem (semver, ex: 1.0.0)'
        required: true
        type: string
      branch:
        description: 'Branch do repositório (default: main)'
        required: false
        default: 'main'

jobs:
  deploy:
    uses: ./.github/workflows/trigger-build-and-push.yml
    with:
      source_repository: A-M-Digital-Data-AI-LatAm/real-estate-control
      branch: ${{ github.event.inputs.branch }}
      env_target: >-
        ${{ github.event.inputs.environment == 'dev' && 'Development'
         || github.event.inputs.environment == 'qa' && 'QA'
         || 'Production' }}
      image_tag: ${{ github.event.inputs.image_tag }}
      iac_scripts_folder: iac_scripts
      dockerfile_folder: .
      containers_config_folder: .github/config/${{ github.event.inputs.environment }}
      cloud_run_region: us-central1
      env_vars_file: .github/config/${{ github.event.inputs.environment }}/env.yaml
    secrets: inherit

  # ─── Cross-check iac-actions security ────────────────────────────────────────
  cross-check:
    name: Cross-check iac-actions security
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report cross-check
        run: |
          IAC_CONCLUSION="${{ needs.deploy.outputs.iac_conclusion }}"
          SECURITY_PASSED="${{ needs.deploy.outputs.security_passed }}"
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ### Cross-check: iac-actions deploy (manual)
          | Campo | Valor |
          |-------|-------|
          | iac-actions conclusion | ${IAC_CONCLUSION:-skipped} |
          | Security checks passed | ${SECURITY_PASSED:-n/a} |
          EOF
          BLOCK=false
          if [ "$IAC_CONCLUSION" = "failure" ]; then
            echo "::error::iac-actions run falhou — verificar run URL para detalhes"
            BLOCK=true
          fi
          if [ "$SECURITY_PASSED" = "false" ]; then
            echo "::error::Checks de segurança no iac-actions não passaram — deploy bloqueado"
            BLOCK=true
          fi
          [ "$BLOCK" = "true" ] && exit 1 || true
